<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1686" viewBox="0 0 2500 1686">
  <defs>
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #F4F7FB; }
      .divider { stroke: #CBD5E1; stroke-width: 5; }
      .card { fill: #FFFFFF; stroke: #D7DEE8; stroke-width: 5; }
      .brand { fill: #7A869A; font: 500 42px "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .title { fill: #172033; font: 800 120px "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .subtitle { fill: #526071; font: 500 58px "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .symbol { font: 800 86px "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; text-anchor: middle; dominant-baseline: central; letter-spacing: 0; }
      .hint { fill: #7A869A; font: 500 38px "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif; text-anchor: middle; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="2500" height="1686"/>
  <line class="divider" x1="834" y1="0" x2="834" y2="1686"/>
  <line class="divider" x1="1667" y1="0" x2="1667" y2="1686"/>
  <line class="divider" x1="0" y1="843" x2="2500" y2="843"/>

  <!-- 1. 檢查填報 -->
  <g transform="translate(28 28)">
    <rect class="card" width="778" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#1A73E8"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="389" cy="252" r="108" fill="#E8F0FE" stroke="#1A73E8" stroke-width="9"/>
    <text class="symbol" x="389" y="252" fill="#1A73E8">檢</text>
    <text class="title" x="389" y="480" text-anchor="middle">檢查填報</text>
    <text class="subtitle" x="389" y="575" text-anchor="middle">日檢・月檢</text>
    <text class="hint" x="389" y="708">開啟檢查表</text>
  </g>

  <!-- 2. 每日作業 -->
  <g transform="translate(862 28)">
    <rect class="card" width="777" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#0F766E"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="388.5" cy="252" r="108" fill="#CCFBF1" stroke="#0F766E" stroke-width="9"/>
    <text class="symbol" x="388.5" y="252" fill="#0F766E">作</text>
    <text class="title" x="388.5" y="480" text-anchor="middle">每日作業</text>
    <text class="subtitle" x="388.5" y="575" text-anchor="middle">課程・異動・公文</text>
    <text class="hint" x="388.5" y="708">填寫檢核表</text>
  </g>

  <!-- 3. 填表狀態 -->
  <g transform="translate(1695 28)">
    <rect class="card" width="777" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#F29900"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="388.5" cy="252" r="108" fill="#FEF7E0" stroke="#F29900" stroke-width="9"/>
    <text class="symbol" x="388.5" y="252" fill="#F29900">狀</text>
    <text class="title" x="388.5" y="480" text-anchor="middle">填表狀態</text>
    <text class="subtitle" x="388.5" y="575" text-anchor="middle">今日進度・提醒</text>
    <text class="hint" x="388.5" y="708">查看填寫狀態</text>
  </g>

  <!-- 4. 日常通報 -->
  <g transform="translate(28 871)">
    <rect class="card" width="778" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#D93025"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="389" cy="252" r="108" fill="#FCE8E6" stroke="#D93025" stroke-width="9"/>
    <text class="symbol" x="389" y="252" fill="#D93025">報</text>
    <text class="title" x="389" y="480" text-anchor="middle">日常通報</text>
    <text class="subtitle" x="389" y="575" text-anchor="middle">場地・環境・安全</text>
    <text class="hint" x="389" y="708">通報異常事件</text>
  </g>

  <!-- 5. 日常待處理 -->
  <g transform="translate(862 871)">
    <rect class="card" width="777" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#188038"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="388.5" cy="252" r="108" fill="#E6F4EA" stroke="#188038" stroke-width="9"/>
    <text class="symbol" x="388.5" y="252" fill="#188038">待</text>
    <text class="title" x="388.5" y="480" text-anchor="middle">日常待處理</text>
    <text class="subtitle" x="388.5" y="575" text-anchor="middle">未結案日常事件</text>
    <text class="hint" x="388.5" y="708">追蹤處理進度</text>
  </g>

  <!-- 6. QR 選單 -->
  <g transform="translate(1695 871)">
    <rect class="card" width="777" height="787" rx="46" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="22" height="787" rx="11" fill="#00897B"/>
    <text class="brand" x="72" y="92">ISHA 工作台</text>
    <circle cx="388.5" cy="252" r="108" fill="#E0F2F1" stroke="#00897B" stroke-width="9"/>
    <text class="symbol" x="388.5" y="252" fill="#00897B" font-size="72">QR</text>
    <text class="title" x="388.5" y="480" text-anchor="middle">QR 選單</text>
    <text class="subtitle" x="388.5" y="575" text-anchor="middle">設備・教室入口</text>
    <text class="hint" x="388.5" y="708">開啟 QR 清單</text>
  </g>

  <rect x="2.5" y="2.5" width="2495" height="1681" fill="none" stroke="#102A4C" stroke-width="5"/>
</svg>

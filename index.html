<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1a73e8">
  <title>自動檢查表系統</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <header class="header">
    <h1>自動檢查表系統</h1>
    <div class="sub" data-org-name></div>
  </header>

  <main class="container">
    <!-- 防護具檢點區（按場地下拉選擇）-->
    <div id="ppeSection" style="display:none; margin-bottom:24px;">
      <h2 class="card-title">防護具每日檢點</h2>
      <div class="equip-card" style="background:#fef7e0; border-left:4px solid #f9ab00;">
        <div class="equip-name">🦺 安全帽 / 安全背心 等</div>
        <div class="equip-meta" style="margin-bottom:12px;">每堂課實習結束後檢點</div>
        <div style="margin-bottom:12px;">
          <label for="ppeVenue" style="display:block; font-size:14px; color:#5f6368; margin-bottom:6px;">選擇場地：</label>
          <select id="ppeVenue" style="width:100%; padding:10px; font-size:16px; border:2px solid #dadce0; border-radius:8px; background:#fff;">
            <option value="">— 請選擇 —</option>
          </select>
        </div>
        <div class="equip-actions">
          <a id="ppeSubmitBtn" class="btn-daily" href="#" onclick="return goPpe()">填寫今日</a>
        </div>
      </div>
    </div>

    <h2 class="card-title" id="listTitle">請選擇設備</h2>
    <div id="content">
      <div class="page-loading"><span class="loading"></span>&nbsp;載入中...</div>
    </div>
    <p style="text-align:center; color:#9aa0a6; font-size:11px; margin-top:32px;">
      <span id="versionTag"></span>
    </p>
  </main>

  <script>
    // 機構名稱由 api.js 啟動時 fetch /branding 動態填到 [data-org-name] 元素
    document.getElementById('versionTag').textContent = SYSTEM_CONFIG.VERSION;

    // 支援 URL 過濾：?cat=堆高機 → 只列堆高機（方案 C：1 張 QR 進入 group 列表）
    const urlCat = new URLSearchParams(location.search).get('cat');
    if (urlCat) {
      document.getElementById('listTitle').textContent = '請選擇' + urlCat;
    }

    function renderError(msg) {
      const root = document.getElementById('content');
      root.textContent = '';
      const div = document.createElement('div');
      div.className = 'alert alert-error';
      div.textContent = msg;
      root.appendChild(div);
    }

    function renderEmpty() {
      const root = document.getElementById('content');
      root.textContent = '';
      const div = document.createElement('div');
      div.className = 'alert alert-info';
      div.textContent = '尚未建立任何設備。請先到 Google Sheets「設備清單」工作表新增。';
      root.appendChild(div);
    }

    function renderList(equipments) {
      const root = document.getElementById('content');
      root.textContent = '';
      equipments.forEach(e => {
        const card = document.createElement('div');
        card.className = 'equip-card';

        const name = document.createElement('div');
        name.className = 'equip-name';
        name.textContent = e.equipmentName || e.equipmentId;
        card.appendChild(name);

        const meta = document.createElement('div');
        meta.className = 'equip-meta';
        meta.textContent = [e.category, e.location, e.equipmentId].filter(Boolean).join(' ｜ ');
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'equip-actions';

        const dailyLink = document.createElement('a');
        dailyLink.className = 'btn-daily';
        dailyLink.textContent = '每日檢點';
        dailyLink.href = 'daily.html?eqp=' + encodeURIComponent(e.equipmentId);
        actions.appendChild(dailyLink);

        const monthlyLink = document.createElement('a');
        monthlyLink.className = 'btn-monthly';
        monthlyLink.textContent = '每月檢查';
        monthlyLink.href = 'monthly.html?eqp=' + encodeURIComponent(e.equipmentId);
        actions.appendChild(monthlyLink);

        card.appendChild(actions);
        root.appendChild(card);
      });
    }

    function goPpe() {
      const v = document.getElementById('ppeVenue').value;
      if (!v) { alert('請先選擇場地'); return false; }
      location.href = 'daily.html?eqp=' + encodeURIComponent(v);
      return false;
    }

    (async () => {
      try {
        const r = await API.listEquipments();
        if (!r.ok) return renderError(r.error || '取得設備清單失敗');
        if (!r.equipments || !r.equipments.length) return renderEmpty();

        // 防護具檢點區與一般設備分開渲染
        const ppeVenues = r.equipments.filter(e => e.category === '防護具檢點');
        const normalEquipments = r.equipments.filter(e => e.category !== '防護具檢點');

        // 顯示防護具區塊（如果有場地）
        if (ppeVenues.length > 0 && !urlCat) {
          const sel = document.getElementById('ppeVenue');
          ppeVenues.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.equipmentId;
            opt.textContent = v.equipmentName;
            sel.appendChild(opt);
          });
          document.getElementById('ppeSection').style.display = 'block';
        }

        // 一般設備列表（支援 URL ?cat=xxx 過濾）
        const filtered = urlCat
          ? normalEquipments.filter(e => e.category === urlCat)
          : normalEquipments;
        if (!filtered.length && !urlCat && ppeVenues.length === 0) return renderEmpty();
        if (!filtered.length && urlCat) return renderError('找不到類別「' + urlCat + '」的設備');
        renderList(filtered);
      } catch (err) {
        renderError('連線後端失敗：' + err.message);
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1a73e8">
  <title>ISHA 檢查與通報工作台</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <header class="header">
    <h1>ISHA 檢查與通報工作台</h1>
    <div class="sub" data-org-name></div>
    <nav class="site-tabs" aria-label="主要分頁">
      <a class="active" href="index.html">檢查填報</a>
      <a href="work-check.html">每日作業</a>
      <a href="incident.html">日常通報</a>
    </nav>
  </header>

  <main class="container">
    <section class="quick-workbench" aria-label="快速填報">
      <div class="quick-head">
        <div>
          <span class="module-eyebrow">TODAY</span>
          <h2>快速填報</h2>
          <p>日檢、月檢、通報</p>
        </div>
      </div>
      <div id="quickActions" class="quick-actions">
        <div class="quick-loading"><span class="loading"></span>&nbsp;載入常用入口...</div>
      </div>
    </section>

    <section id="checklist" class="workspace-section">
      <h2 class="section-title">檢查填報</h2>
      <div id="groupSections"></div>

      <h2 class="card-title" id="listTitle">請選擇設備</h2>
      <div id="content">
        <div class="page-loading"><span class="loading"></span>&nbsp;載入中...</div>
      </div>
    </section>

    <p style="text-align:center; color:#9aa0a6; font-size:11px; margin-top:32px;">
      <span id="versionTag"></span>
    </p>
  </main>

  <script>
    // 機構名稱由 api.js 啟動時 fetch /branding 動態填到 [data-org-name] 元素
    document.getElementById('versionTag').textContent = SYSTEM_CONFIG.VERSION;

    // 支援 URL 過濾：?cat=堆高機 → 只列堆高機（方案 C：1 張 QR 進入 group 列表）
    const urlCat = new URLSearchParams(location.search).get('cat');
    if (urlCat) {
      document.getElementById('listTitle').textContent = '請選擇' + urlCat;
      document.querySelector('.quick-workbench').style.display = 'none';
    }

    function renderQuickStatus(msg) {
      const root = document.getElementById('quickActions');
      if (!root || urlCat) return;
      root.textContent = '';
      const div = document.createElement('div');
      div.className = 'quick-loading';
      div.textContent = msg;
      root.appendChild(div);
    }

    function renderError(msg) {
      const root = document.getElementById('content');
      root.textContent = '';
      const div = document.createElement('div');
      div.className = 'alert alert-error';
      div.textContent = msg;
      root.appendChild(div);
      renderQuickStatus('常用入口載入失敗，請稍後重整。');
    }

    function renderEmpty() {
      const root = document.getElementById('content');
      root.textContent = '';
      const div = document.createElement('div');
      div.className = 'alert alert-info';
      div.textContent = '尚未建立任何設備。請先到 Google Sheets「設備清單」工作表新增。';
      root.appendChild(div);
      renderQuickStatus('尚未建立可用的填報入口。');
    }

    const classroomMonthlyIds = new Set([
      'CLASSROOM-LJ-MEAS-PPE',
      'CLASSROOM-FX-MEAS-PPE',
      'CLASSROOM-ZM-MEAS-PPE',
    ]);

    const sectionDefs = [
      {
        type: 'selector',
        key: 'forklift',
        quickIcon: '🚜',
        quickTitle: '堆高機',
        quickMeta: 'A-F 號今日檢點',
        title: '堆高機',
        name: '🚜 堆高機 A-F 號',
        meta: '每日使用前檢點 / 每月定期檢查',
        selectLabel: '選擇堆高機：',
        match: e => e.category === '堆高機' && (e.hasDaily !== false || e.hasMonthly !== false),
        showForCat: cat => !cat || cat === '堆高機',
        actions: [
          {
            text: '填寫今日',
            className: 'btn-daily',
            href: id => 'daily.html?eqp=' + encodeURIComponent(id),
          },
          {
            text: '填寫月檢',
            className: 'btn-monthly',
            href: id => 'monthly.html?eqp=' + encodeURIComponent(id),
          },
        ],
      },
      {
        type: 'cards',
        key: 'crane',
        quickIcon: '🏗️',
        quickTitle: '起重機',
        quickMeta: '固定式起重機',
        title: '固定式起重機',
        match: e => e.category === '固定式起重機',
        showForCat: cat => !cat || cat === '固定式起重機',
      },
      {
        type: 'cards',
        key: 'awp',
        quickIcon: '🛻',
        quickTitle: '高空工作車',
        quickMeta: '車載式 / 自走式',
        title: '高空工作車每日檢點',
        match: e => e.category === '高空工作車' && e.hasDaily !== false,
        showForCat: cat => !cat || cat === '高空工作車',
      },
      {
        type: 'selector',
        key: 'ppe-daily',
        quickIcon: '🦺',
        quickTitle: '防護具',
        quickMeta: '場地防護具檢點',
        title: '防護具每日檢點',
        name: '🦺 安全帽 / 安全背心 等',
        meta: '每堂課實習結束後檢點',
        selectLabel: '選擇場地：',
        match: e => e.category === '防護具檢點' && e.hasDaily !== false,
        showForCat: cat => !cat || cat === '防護具檢點',
        actions: [
          {
            text: '填寫今日',
            className: 'btn-daily',
            href: id => 'daily.html?eqp=' + encodeURIComponent(id),
          },
        ],
      },
      {
        type: 'selector',
        key: 'classroom-monthly',
        quickIcon: '📋',
        quickTitle: '教室月檢',
        quickMeta: '量測設備 / 個人防護具',
        title: '教室量測設備及個人防護具月檢',
        name: '📋 龍井 / 復興 / 忠明教室',
        meta: '每月 1-5 日應檢；SCBA 已併入表單下方區塊',
        selectLabel: '選擇教室：',
        match: e => classroomMonthlyIds.has(String(e.equipmentId || '').toUpperCase()) && e.hasMonthly !== false,
        showForCat: cat => !cat || /教室/.test(cat),
        optionLabel: e => e.location || e.equipmentName || e.equipmentId,
        actions: [
          {
            text: '填寫月檢',
            className: 'btn-monthly',
            href: id => 'monthly.html?eqp=' + encodeURIComponent(id),
          },
        ],
      },
    ];

    function renderGroupedSelector(def, equipments) {
      const section = document.createElement('div');
      section.className = 'selector-section';
      section.id = 'section-' + def.key;

      const title = document.createElement('h2');
      title.className = 'card-title';
      title.textContent = def.title;
      section.appendChild(title);

      const card = document.createElement('div');
      card.className = 'equip-card selector-card';

      const name = document.createElement('div');
      name.className = 'equip-name';
      name.textContent = def.name;
      card.appendChild(name);

      const meta = document.createElement('div');
      meta.className = 'equip-meta';
      meta.textContent = def.meta;
      card.appendChild(meta);

      const field = document.createElement('div');
      field.className = 'selector-field';
      const label = document.createElement('label');
      label.setAttribute('for', def.key);
      label.textContent = def.selectLabel;
      const select = document.createElement('select');
      select.id = def.key;
      select.className = 'selector-control';
      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = '— 請選擇 —';
      select.appendChild(empty);
      equipments.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.equipmentId;
        opt.textContent = def.optionLabel ? def.optionLabel(e) : (e.equipmentName || e.equipmentId);
        select.appendChild(opt);
      });
      field.appendChild(label);
      field.appendChild(select);
      card.appendChild(field);

      const actions = document.createElement('div');
      actions.className = 'equip-actions selector-actions';
      def.actions.forEach(action => {
        const link = document.createElement('a');
        link.className = action.className;
        link.href = '#';
        link.textContent = action.text;
        link.onclick = () => {
          if (!select.value) {
            alert(def.selectLabel.replace('：', ''));
            return false;
          }
          location.href = action.href(select.value);
          return false;
        };
        actions.appendChild(link);
      });
      card.appendChild(actions);

      section.appendChild(card);
      return section;
    }

    function renderEquipmentCard(e) {
      const card = document.createElement('div');
      card.className = 'equip-card';

      const name = document.createElement('div');
      name.className = 'equip-name';
      name.textContent = e.equipmentName || e.equipmentId;
      card.appendChild(name);

      const meta = document.createElement('div');
      meta.className = 'equip-meta';
      meta.textContent = [e.category, e.location, e.equipmentId].filter(Boolean).join(' ｜ ');
      card.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'equip-actions';

      const hasDaily = e.hasDaily !== false;
      const hasMonthly = e.hasMonthly !== false;

      if (hasDaily) {
        const dailyLink = document.createElement('a');
        dailyLink.className = 'btn-daily';
        dailyLink.textContent = '每日檢點';
        dailyLink.href = 'daily.html?eqp=' + encodeURIComponent(e.equipmentId);
        actions.appendChild(dailyLink);
      }

      if (hasMonthly) {
        const monthlyLink = document.createElement('a');
        monthlyLink.className = 'btn-monthly';
        monthlyLink.textContent = '每月檢查';
        monthlyLink.href = 'monthly.html?eqp=' + encodeURIComponent(e.equipmentId);
        actions.appendChild(monthlyLink);
      }

      if (!hasDaily && !hasMonthly) {
        const muted = document.createElement('span');
        muted.className = 'equip-meta';
        muted.textContent = '尚未啟用表單';
        actions.appendChild(muted);
      }

      card.appendChild(actions);
      return card;
    }

    function renderCardSection(def, equipments) {
      const section = document.createElement('div');
      section.className = 'selector-section';
      section.id = 'section-' + def.key;

      const title = document.createElement('h2');
      title.className = 'card-title';
      title.textContent = def.title;
      section.appendChild(title);

      equipments.forEach(e => section.appendChild(renderEquipmentCard(e)));
      return section;
    }

    function renderGroupSections(equipments) {
      const root = document.getElementById('groupSections');
      root.textContent = '';
      let count = 0;
      sectionDefs.forEach(def => {
        if (!def.showForCat(urlCat)) return;
        const items = equipments.filter(def.match);
        if (!items.length) return;
        root.appendChild(def.type === 'selector'
          ? renderGroupedSelector(def, items)
          : renderCardSection(def, items));
        count++;
      });
      return count;
    }

    function renderQuickActions(equipments) {
      const root = document.getElementById('quickActions');
      if (!root || urlCat) return 0;
      root.textContent = '';
      let count = 0;

      sectionDefs.forEach(def => {
        const items = equipments.filter(def.match);
        if (!items.length) return;
        const link = document.createElement('a');
        link.className = 'quick-action';
        link.href = '#section-' + def.key;

        const icon = document.createElement('span');
        icon.className = 'quick-icon';
        icon.textContent = def.quickIcon || '✓';

        const text = document.createElement('span');
        text.className = 'quick-text';
        const title = document.createElement('strong');
        title.textContent = def.quickTitle || def.title;
        const meta = document.createElement('small');
        meta.textContent = def.quickMeta || '選擇後填報';
        text.appendChild(title);
        text.appendChild(meta);

        link.appendChild(icon);
        link.appendChild(text);
        root.appendChild(link);
        count++;
      });

      const incidentLink = document.createElement('a');
      incidentLink.className = 'quick-action quick-action-incident';
      incidentLink.href = 'incident.html';
      incidentLink.innerHTML = '<span class="quick-icon">🚨</span><span class="quick-text"><strong>日常通報</strong><small>異常事件 / 處理回報</small></span>';
      root.appendChild(incidentLink);
      count++;

      const workLink = document.createElement('a');
      workLink.className = 'quick-action quick-action-work';
      workLink.href = 'work-check.html';
      workLink.innerHTML = '<span class="quick-icon">🗓</span><span class="quick-text"><strong>每日作業</strong><small>課程報備 / 異動 / 公文</small></span>';
      root.appendChild(workLink);
      count++;
      return count;
    }

    function isPrimarySectionEquipment(e) {
      return sectionDefs.some(def => def.match(e));
    }

    function renderList(equipments) {
      const root = document.getElementById('content');
      root.textContent = '';
      equipments.forEach(e => {
        root.appendChild(renderEquipmentCard(e));
      });
    }

    (async () => {
      try {
        const r = await API.listEquipments();
        if (!r.ok) return renderError(r.error || '取得設備清單失敗');
        if (!r.equipments || !r.equipments.length) return renderEmpty();

        renderQuickActions(r.equipments);
        const renderedGroups = renderGroupSections(r.equipments);

        // 其他設備列表（支援 URL ?cat=xxx 過濾；已收進下拉選單的設備不重複顯示）
        const filtered = urlCat
          ? r.equipments.filter(e => e.category === urlCat && !isPrimarySectionEquipment(e))
          : r.equipments.filter(e => !isPrimarySectionEquipment(e));

        const listTitle = document.getElementById('listTitle');
        if (filtered.length) {
          listTitle.style.display = '';
          listTitle.textContent = urlCat ? urlCat : '其他設備';
          renderList(filtered);
        } else {
          listTitle.style.display = 'none';
          document.getElementById('content').textContent = '';
        }

        if (!filtered.length && renderedGroups === 0 && !urlCat) return renderEmpty();
        if (!filtered.length && renderedGroups === 0 && urlCat) return renderError('找不到類別「' + urlCat + '」的設備');
      } catch (err) {
        renderError('連線後端失敗：' + err.message);
      }
    })();
  </script>
</body>
</html>

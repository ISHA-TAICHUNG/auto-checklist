<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 18mm 12mm; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    font-size: 11px; color: #000; margin: 0; padding: 0;
  }
  h1 { text-align: center; font-size: 17px; margin: 0 0 4px; }
  .org { text-align: center; font-size: 12px; color: #555; margin-bottom: 14px; }
  .meta-table {
    width: 100%; border-collapse: collapse; margin-bottom: 12px;
    font-size: 11px;
  }
  .meta-table td { border: 1px solid #888; padding: 5px 8px; }
  .meta-table td.label { background: #f0f0f0; width: 90px; font-weight: 600; }
  table.items {
    width: 100%; border-collapse: collapse; font-size: 10.5px;
    table-layout: fixed;
  }
  table.items th, table.items td {
    border: 1px solid #555; padding: 5px 6px; vertical-align: top;
  }
  table.items th {
    background: #e6e9ee; font-weight: 600; text-align: center;
  }
  table.items td.idx { text-align: center; }
  table.items td.center { text-align: center; }
  .risk-V { color: #c5221f; font-weight: 700; }
  .risk-Q { color: #b06000; font-weight: 700; }
  .risk-none { color: #137333; }
  .res-bad { color: #c5221f; font-weight: 700; }
  .res-good { color: #137333; font-weight: 600; }
  .rule {
    margin: 10px 0; padding: 8px; background: #f8f8f8; border-left: 3px solid #1a73e8;
    font-size: 10px; color: #444;
  }
  .footer {
    margin-top: 14px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .sig-box {
    width: 240px; border-bottom: 1px solid #000; padding-bottom: 4px;
    text-align: center; min-height: 60px;
  }
  .sig-box img { max-width: 100%; max-height: 60px; }
  .sig-label { font-size: 10px; color: #555; margin-top: 2px; }
  .submit-meta { font-size: 10px; color: #888; text-align: right; }
</style>
</head>
<body>

<? var p = payload; ?>
<? var eq = equipment; ?>

<h1>固定式起重機每月定期檢查紀錄</h1>
<div class="org"><?= org ?></div>

<table class="meta-table">
  <tr>
    <td class="label">設置單位</td><td colspan="3"><?= org ?></td>
  </tr>
  <tr>
    <td class="label">設備名稱</td><td><?= eq.equipmentName ?></td>
    <td class="label">設備類別</td><td><?= eq.category ?></td>
  </tr>
  <tr>
    <td class="label">機械編號</td><td><?= eq.machineSerial ?></td>
    <td class="label">型式規格</td><td><?= eq.machineType ?></td>
  </tr>
  <tr>
    <td class="label">所在位置</td><td><?= eq.location ?></td>
    <td class="label">檢查日期</td>
    <td><b><?= rocDateStr.substring(0,3) + '/' + rocDateStr.substring(3,5) + '/' + rocDateStr.substring(5,7) ?></b>（民國）</td>
  </tr>
</table>

<table class="items">
  <colgroup>
    <col style="width:5%">
    <col style="width:28%">
    <col style="width:10%">
    <col style="width:17%">
    <col style="width:10%">
    <col style="width:15%">
    <col style="width:15%">
  </colgroup>
  <thead>
    <tr>
      <th>項次</th>
      <th>檢查部份</th>
      <th>檢查方法</th>
      <th>檢查結果</th>
      <th>風險評估</th>
      <th>改善措施</th>
      <th>定期檢討</th>
    </tr>
  </thead>
  <tbody>
    <? for (var i = 0; i < p.items.length; i++) {
         var it = p.items[i];
         var methods = (it.methods || []).join(' / ');
         var resCls = it.result === 'abnormal' ? 'res-bad' : 'res-good';
         var resText = it.result === 'abnormal'
           ? '異常：' + (it.abnormalDesc || '')
           : '正常';
         var riskMap = { severe: ['V', 'risk-V'], possible: ['?', 'risk-Q'], none: ['—', 'risk-none'] };
         var riskCell = riskMap[it.risk] || ['', ''];
    ?>
      <tr>
        <td class="idx"><?= it.order ?></td>
        <td><?= it.name ?></td>
        <td class="center"><?= methods ?></td>
        <td class="<?= resCls ?>"><?= resText ?></td>
        <td class="center <?= riskCell[1] ?>"><?= riskCell[0] ?></td>
        <td><?= it.action || '' ?></td>
        <td><?= it.review || '' ?></td>
      </tr>
    <? } ?>
  </tbody>
</table>

<div class="rule">
  注意事項：檢查結果應詳細紀錄。<br>
  風險評估：嚴重性危害「V」/ 可能性危害「?」/ 無危害「—」
</div>

<div class="footer">
  <div>
    <div class="sig-box">
      <? // signatureUrl 來自 Pdf.gs，是 Drive 暫存圖的 URL（Apps Script PDF 引擎支援）
         // 不能用 base64 data URL，PDF 引擎不支援會變破圖
         if (signatureUrl) { ?>
        <img src="<?= signatureUrl ?>" alt="signature">
      <? } ?>
    </div>
    <div class="sig-label">檢查人員簽名：<?= p.inspector || '' ?></div>
  </div>
  <div class="submit-meta">
    送出時間：<?= submittedAt ?><br>
    系統自動產製
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 18mm 14mm; }
  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    font-size: 12px; color: #000; margin: 0; padding: 0;
  }
  h1 { text-align: center; font-size: 18px; margin: 0 0 4px; }
  .org { text-align: center; font-size: 12px; color: #555; margin-bottom: 16px; }
  .meta-table {
    width: 100%; border-collapse: collapse; margin-bottom: 14px;
    font-size: 12px;
  }
  .meta-table td {
    border: 1px solid #888; padding: 5px 8px;
  }
  .meta-table td.label {
    background: #f0f0f0; width: 90px; font-weight: 600;
  }
  table.items {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  table.items th, table.items td {
    border: 1px solid #555; padding: 6px 8px; vertical-align: middle;
  }
  table.items th {
    background: #e6e9ee; font-weight: 600; text-align: center;
  }
  table.items td.idx { text-align: center; width: 28px; }
  table.items td.res { text-align: center; width: 60px; font-size: 16px; font-weight: 700; }
  table.items td.res.good { color: #137333; }
  table.items td.res.bad { color: #c5221f; }
  table.items td.note { color: #c5221f; font-size: 11px; }
  .rule {
    margin: 10px 0; padding: 8px; background: #f8f8f8; border-left: 3px solid #1a73e8;
    font-size: 11px; color: #444;
  }
  .footer {
    margin-top: 18px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .sig-box {
    width: 240px; border-bottom: 1px solid #000; padding-bottom: 4px;
    text-align: center; min-height: 60px;
  }
  .sig-box img { max-width: 100%; max-height: 60px; }
  .sig-label { font-size: 11px; color: #555; margin-top: 2px; }
  .submit-meta { font-size: 10px; color: #888; text-align: right; }
</style>
</head>
<body>

<? var p = payload; ?>
<? var eq = equipment; ?>

<h1>固定式起重機每日作業前檢點表</h1>
<div class="org"><?= org ?></div>

<table class="meta-table">
  <tr>
    <td class="label">設備名稱</td><td><?= eq.equipmentName ?></td>
    <td class="label">設備類別</td><td><?= eq.category ?></td>
  </tr>
  <tr>
    <td class="label">機械編號</td><td><?= eq.machineSerial ?></td>
    <td class="label">型式規格</td><td><?= eq.machineType ?></td>
  </tr>
  <tr>
    <td class="label">所在位置</td><td><?= eq.location ?></td>
    <td class="label">檢查日期</td><td><b><?= rocDateStr.substring(0,3) + '/' + rocDateStr.substring(3,5) + '/' + rocDateStr.substring(5,7) ?></b>（民國）</td>
  </tr>
</table>

<table class="items">
  <thead>
    <tr>
      <th>項次</th>
      <th>檢查項目</th>
      <th>結果</th>
      <th>記事 / 異常說明</th>
    </tr>
  </thead>
  <tbody>
    <? for (var i = 0; i < p.items.length; i++) {
         var it = p.items[i];
         var resCls = it.result === 'V' ? 'good' : (it.result === 'X' ? 'bad' : '');
         var resText = it.result;
    ?>
      <tr>
        <td class="idx"><?= it.order ?></td>
        <td><?= it.name ?></td>
        <td class="res <?= resCls ?>"><?= resText ?></td>
        <td class="note"><?= it.note || '' ?></td>
      </tr>
    <? } ?>
  </tbody>
</table>

<div class="rule">
  填寫規則：良好「V」/ 無此項「/」/ 不良「X」（不良需於記事欄註明）。<br>
  依據「職業安全衛生管理辦法」第五十二條規定，實施檢查時，如發現對勞工有危害之虞時，應即報告主管；如發現異常時，應立即檢修或採取必要措施。
</div>

<div class="footer">
  <div>
    <div class="sig-box">
      <? if (p.signature) { ?>
        <img src="<?= p.signature ?>" alt="signature">
      <? } ?>
    </div>
    <div class="sig-label">檢點人員簽名：<?= p.inspector || '' ?></div>
  </div>
  <div class="submit-meta">
    送出時間：<?= submittedAt ?><br>
    系統自動產製
  </div>
</div>

</body>
</html>
